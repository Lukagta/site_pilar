version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: site_pilar_backend
    ports:
      - "3015:3015"
    volumes:
      - ./backend/prisma/dev.db:/app/prisma/dev.db
      - ./backend/images:/app/images
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.site_pilar_backend.rule=Host(`api.clinicapilar.com.br`)"
      - "traefik.http.routers.site_pilar_backend.entrypoints=websecure"
      - "traefik.http.routers.site_pilar_backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.site_pilar_backend.loadbalancer.server.port=3015"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "https://api.clinicapilar.com.br"
    container_name: site_pilar_frontend
    ports:
      - "5185:80"
    restart: always
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.site_pilar_frontend.rule=Host(`clinicapilar.com.br`) || Host(`www.clinicapilar.com.br`)"
      - "traefik.http.routers.site_pilar_frontend.entrypoints=websecure"
      - "traefik.http.routers.site_pilar_frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.site_pilar_frontend.loadbalancer.server.port=80"
